services:
  # Admin API (FastAPI)
  admin-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    command: gunicorn src.admin_api.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:8000 --timeout 120 --graceful-timeout 30 --max-requests 1000 --max-requests-jitter 100

  # Celery Worker — fast (dispatch/prepare/price/transaction/molit + 시스템 큐)
  celery-worker-fast:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONFAULTHANDLER: "1"
      KB_LOGIN_ID: ${KB_LOGIN_ID:-}
      KB_LOGIN_PASSWORD: ${KB_LOGIN_PASSWORD:-}
      KB_ACCESS_TOKEN: ${KB_ACCESS_TOKEN:-}
      KB_REFRESH_TOKEN: ${KB_REFRESH_TOKEN:-}
    volumes:
      - ./src:/app/src
    command: celery -A src.workers.celery_app worker --pool=prefork --concurrency=4 -Q dispatch,prepare,fast,celery -n fast@%h --loglevel=info

  # Celery Worker — slow (listing 전용, transient 백오프가 fast 슬롯을 막지 않도록 격리)
  celery-worker-slow:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONFAULTHANDLER: "1"
      KB_LOGIN_ID: ${KB_LOGIN_ID:-}
      KB_LOGIN_PASSWORD: ${KB_LOGIN_PASSWORD:-}
      KB_ACCESS_TOKEN: ${KB_ACCESS_TOKEN:-}
      KB_REFRESH_TOKEN: ${KB_REFRESH_TOKEN:-}
    volumes:
      - ./src:/app/src
    command: celery -A src.workers.celery_app worker --pool=prefork --concurrency=2 -Q slow -n slow@%h --loglevel=info

  # Celery Beat (Scheduler)
  celery-beat:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./src:/app/src
    command: celery -A src.workers.celery_app beat --loglevel=info

  # Frontend (Vite dev server)
  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5174"
    environment:
      VITE_DEV_API_TARGET: http://admin-api:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]

# 공유 인프라(postgres/redis)는 newtech-platform 의 docker-compose 가 책임.
# 본 compose 의 admin-api / celery / frontend 는 그 네트워크에 합류해
# 컨테이너 이름(postgres, redis) 으로 직접 연결한다.
networks:
  default:
    name: newtech-platform_default
    external: true
