services:
  # Admin API (FastAPI)
  admin-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn src.admin_api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src/admin_api

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONFAULTHANDLER: "1"
      KB_LOGIN_ID: ${KB_LOGIN_ID:-}
      KB_LOGIN_PASSWORD: ${KB_LOGIN_PASSWORD:-}
      KB_ACCESS_TOKEN: ${KB_ACCESS_TOKEN:-}
      KB_REFRESH_TOKEN: ${KB_REFRESH_TOKEN:-}
    volumes:
      - ./src:/app/src
    command: celery -A src.workers.celery_app worker --pool=prefork --concurrency=4 --loglevel=info

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://kb_user:change-me-in-production@postgres:5432/kb_estate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./src:/app/src
    command: celery -A src.workers.celery_app beat --loglevel=info

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5174"
    environment:
      VITE_DEV_API_TARGET: http://admin-api:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]

# 공유 인프라(postgres/redis)는 newtech-platform 의 docker-compose 가 책임.
# 본 compose 의 admin-api / celery / frontend 는 그 네트워크에 합류해
# 컨테이너 이름(postgres, redis) 으로 직접 연결한다.
networks:
  default:
    name: newtech-platform_default
    external: true
